<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francis Niel Tamayo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080808;--fg:#e8e8e4;--dim:#4a4a4a;--border:#1e1e1e;--font:'Space Mono',monospace;--ease:cubic-bezier(.16,1,.3,1);--back:cubic-bezier(.34,1.56,.64,1)}
html,body,#root{width:100%;min-height:100%}
body{background:var(--bg);color:var(--fg);font-family:var(--font);overflow-x:hidden;cursor:none;transition:background .7s,color .7s}

/* SCROLL PROGRESS */
#prog{position:fixed;top:0;left:0;height:2px;width:0%;background:var(--fg);z-index:9999;mix-blend-mode:difference;transition:width .08s linear}

/* THEME FLASH */
#tflash{position:fixed;inset:0;z-index:5000;pointer-events:none;opacity:0;background:var(--fg);transition:opacity .15s}
#tflash.on{opacity:.07}

/* PAGE WIPE */
#wipe{position:fixed;inset:0;z-index:4000;pointer-events:none;background:var(--fg);transform:scaleY(0);transform-origin:bottom}
#wipe.in{animation:wipeIn .45s var(--ease) forwards}
#wipe.out{animation:wipeOut .45s var(--ease) forwards}
@keyframes wipeIn{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes wipeOut{from{transform:scaleY(1);transform-origin:top}to{transform:scaleY(0);transform-origin:top}}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:8000;display:flex;align-items:center;justify-content:center;transition:opacity .9s var(--ease),transform .9s var(--ease)}
#splash.hide{opacity:0;transform:translateY(-10px);pointer-events:none}
.sp-name{font-size:clamp(26px,5vw,54px);font-weight:700;letter-spacing:-.03em;overflow:hidden}
.sp-name span{display:block;animation:su 1s var(--ease) .3s both}
.sp-bar{width:0;height:1px;background:var(--fg);margin-top:18px;animation:grow 1.6s var(--ease) .5s forwards}
.sp-sub{font-size:10px;letter-spacing:.2em;color:var(--dim);margin-top:14px;opacity:0;animation:fu .8s ease 1.3s forwards}
@keyframes grow{from{width:0}to{width:100%}}

/* CURSOR */
.cur{position:fixed;width:7px;height:7px;background:var(--fg);border-radius:50%;pointer-events:none;z-index:7000;transform:translate(-50%,-50%);transition:width .2s,height .2s;mix-blend-mode:difference}
.cur.h{width:13px;height:13px}
.cur.ck{width:18px;height:18px;opacity:.5}
.cur-ring{position:fixed;width:30px;height:30px;border:1px solid rgba(232,232,228,.4);border-radius:50%;pointer-events:none;z-index:6999;transform:translate(-50%,-50%);transition:width .4s var(--back),height .4s var(--back)}
.cur-ring.h{width:56px;height:56px;opacity:.28}

/* RIPPLE */
.rip{position:fixed;border-radius:50%;background:rgba(232,232,228,.09);pointer-events:none;z-index:6998;transform:translate(-50%,-50%) scale(0);animation:rip .65s var(--ease) forwards}
@keyframes rip{to{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* FOG CANVAS */
#fog{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* HOVER PREVIEW */
.proj-preview{position:fixed;width:220px;height:140px;pointer-events:none;z-index:3000;border:1px solid var(--border);overflow:hidden;opacity:0;transform:scale(.92) translateY(8px);transition:opacity .3s var(--ease),transform .3s var(--ease);background:var(--bg)}
.proj-preview.show{opacity:1;transform:scale(1) translateY(0)}
.proj-preview img{width:100%;height:100%;object-fit:cover;filter:grayscale(30%)}
.proj-preview .prev-label{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;font-size:9px;letter-spacing:.12em;color:var(--dim);background:linear-gradient(transparent,rgba(8,8,8,.9))}

/* BACK TO TOP */
#btt{position:fixed;bottom:40px;right:40px;z-index:200;width:40px;height:40px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-family:var(--font);font-size:16px;cursor:none;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s,border-color .3s,color .3s}
#btt.show{opacity:1;transform:translateY(0)}
#btt:hover{border-color:var(--fg);color:var(--fg)}

/* LAYOUT */
.wrap{position:relative;z-index:1}
header{position:fixed;top:0;left:0;width:100%;padding:26px 44px;display:flex;justify-content:space-between;align-items:center;z-index:500}
.logo-wrap{display:flex;align-items:center;gap:14px;mix-blend-mode:difference}
.logo{font-size:12px;letter-spacing:.06em;text-decoration:none;color:var(--fg);font-weight:700;position:relative}
.logo::after{content:'';position:absolute;bottom:-1px;left:0;width:0;height:1px;background:var(--fg);transition:width .5s var(--ease)}
.logo:hover::after{width:100%}
.badge{display:flex;align-items:center;gap:6px;font-size:9px;letter-spacing:.12em;color:var(--dim);padding:4px 10px;border:1px solid var(--border)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#3ddc84;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}

.themes{display:flex;gap:14px;font-size:10px;letter-spacing:.1em;color:var(--dim);mix-blend-mode:difference}
.themes button{background:none;border:none;color:inherit;font-family:var(--font);cursor:none;transition:color .3s;padding:0;font-size:10px}
.themes button:hover,.themes button.on{color:var(--fg)}

.hbg{display:none;flex-direction:column;gap:5px;cursor:none;padding:4px;mix-blend-mode:difference;background:none;border:none}
.hbg span{display:block;width:22px;height:1px;background:var(--fg);transition:transform .4s var(--ease),opacity .3s}
.hbg.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hbg.open span:nth-child(2){opacity:0}
.hbg.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mobmenu{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:36px;opacity:0;pointer-events:none;transition:opacity .4s var(--ease)}
.mobmenu.open{opacity:1;pointer-events:all}
.mobmenu a{font-size:28px;font-weight:700;letter-spacing:-.02em;text-decoration:none;color:var(--dim);transition:color .3s}
.mobmenu a:hover{color:var(--fg)}

nav.side{position:fixed;left:40px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:20px}
nav.side a{text-decoration:none;color:var(--dim);font-size:10px;letter-spacing:.14em;display:flex;align-items:center;gap:10px;transition:color .3s;cursor:none;white-space:nowrap}
.dot{width:4px;height:4px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .3s,transform .45s var(--back),box-shadow .3s}
nav.side a:hover{color:var(--fg)}
nav.side a:hover .dot{background:var(--fg);transform:scale(2.2);box-shadow:0 0 8px rgba(232,232,228,.5)}
nav.side a.on{color:var(--fg)}
nav.side a.on .dot{background:var(--fg);transform:scale(1.6)}

main{padding:0 0 0 140px}
section{padding:130px 80px 130px 0}
#home{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-top:100px;padding-bottom:80px;position:relative;overflow:hidden}

/* HERO */
.h-sub{font-size:10px;letter-spacing:.2em;color:var(--dim);margin-bottom:32px;text-transform:uppercase;min-height:16px}
.h-title{font-size:clamp(52px,7.5vw,96px);font-weight:700;line-height:.95;letter-spacing:-.03em;will-change:transform}
.h-title .ln{display:block;overflow:hidden}
.h-title .ln span{display:block;opacity:0;transform:translateY(108%);animation:su .95s var(--ease) forwards}
.h-title .ln:nth-child(1) span{animation-delay:2s}
.h-title .ln:nth-child(2) span{animation-delay:2.12s}
.h-title .ln:nth-child(3) span{animation-delay:2.24s}
.h-desc{margin-top:48px;max-width:440px;font-size:13px;line-height:2.1;color:rgba(232,232,228,.55);opacity:0;animation:fu 1.1s ease 2.5s forwards}
.h-desc em{font-style:italic;color:var(--fg)}
.scroll-hint{position:absolute;bottom:48px;left:0;font-size:9px;letter-spacing:.25em;color:var(--dim);opacity:0;animation:fu 1s ease 2.9s forwards;display:flex;align-items:center;gap:14px;text-transform:uppercase}
.scroll-hint::before{content:'';display:block;width:36px;height:1px;background:var(--dim);animation:la 2.5s ease 3.3s infinite}

.stats{display:flex;gap:52px;margin-top:56px;opacity:0;animation:fu 1s ease 2.6s forwards}
.stat-num{font-size:clamp(32px,4vw,52px);font-weight:700;letter-spacing:-.03em;line-height:1}
.stat-label{font-size:10px;letter-spacing:.15em;color:var(--dim);margin-top:6px;text-transform:uppercase}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:200px 1fr;gap:64px;align-items:start}
.avatar-wrap{position:relative}
.avatar{width:180px;height:220px;background:var(--border);overflow:hidden;position:relative}
.avatar::after{content:'FNT';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--dim);letter-spacing:-.02em}
.avatar img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1;filter:grayscale(20%)}
.avatar-status{position:absolute;bottom:-12px;left:0;right:0;display:flex;justify-content:center}
.about-content h3{font-size:10px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin-bottom:24px}
.about-content p{font-size:13px;line-height:2.3;color:rgba(232,232,228,.65);margin-bottom:20px}

/* SECTION SHARED */
.sep{border-top:1px solid var(--border)}
.sh{display:flex;align-items:baseline;gap:20px;margin-bottom:80px}
.st{font-size:10px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase}
.sl{flex:1;height:1px;background:var(--border);max-width:180px;transform:scaleX(0);transform-origin:left;transition:transform .8s var(--ease)}
.vis .sl{transform:scaleX(1)}

/* PROJECTS */
.pl{list-style:none}
.pi{border-top:1px solid var(--border);position:relative;overflow:hidden}
.pi:last-child{border-bottom:1px solid var(--border)}
.pi::after{content:'';position:absolute;left:0;bottom:0;width:100%;height:1px;background:var(--fg);transform:scaleX(0);transform-origin:left;transition:transform .55s var(--ease)}
.pi:hover::after{transform:scaleX(1)}
.plink{display:flex;justify-content:space-between;align-items:center;padding:24px 0;text-decoration:none;color:var(--fg);position:relative;z-index:1;gap:28px}
.plink::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(232,232,228,.05),transparent);transform:scaleX(0);transform-origin:left;transition:transform .5s var(--ease);z-index:-1}
.pi:hover .plink::before{transform:scaleX(1)}
.pname{font-size:clamp(14px,1.9vw,19px);font-weight:700;letter-spacing:-.01em;flex:1;transition:letter-spacing .45s ease}
.pi:hover .pname{letter-spacing:.02em}
.pmeta{font-size:10px;color:var(--dim);letter-spacing:.08em;text-align:right;white-space:nowrap}
.ptag{font-size:9px;letter-spacing:.1em;color:var(--dim);padding:2px 8px;border:1px solid var(--border);white-space:nowrap}
.parr{font-size:15px;color:var(--dim);flex-shrink:0;display:inline-block;transition:transform .45s var(--back),color .3s}
.pi:hover .parr{transform:translate(6px,-6px);color:var(--fg)}

/* SKILLS */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 60px}
.skill-row{padding:10px 0;border-bottom:1px solid var(--border)}
.skill-top{display:flex;justify-content:space-between;margin-bottom:10px;font-size:11px;letter-spacing:.08em}
.skill-pct{color:var(--dim)}
.skill-track{height:1px;background:var(--border);overflow:hidden}
.skill-fill{height:100%;background:var(--fg);width:0;transition:width 1.3s var(--ease)}
.skill-fill.go{width:var(--w)}

/* TIMELINE */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:44px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-32px;top:6px;width:8px;height:8px;border-radius:50%;border:1px solid var(--dim);background:var(--bg);transition:border-color .3s,background .3s,box-shadow .3s}
.tl-item:hover .tl-dot{border-color:var(--fg);background:var(--fg);box-shadow:0 0 10px rgba(232,232,228,.3)}
.tl-date{font-size:10px;letter-spacing:.15em;color:var(--dim);margin-bottom:8px}
.tl-role{font-size:14px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.tl-co{font-size:11px;color:var(--dim);letter-spacing:.06em;margin-bottom:10px}
.tl-desc{font-size:12px;line-height:1.9;color:rgba(232,232,228,.55)}

/* TESTIMONIALS */
.testi-wrap{overflow:hidden}
.testi-track{display:flex;transition:transform .6s var(--ease)}
.testi-slide{min-width:100%;padding-right:40px}
.testi-quote{font-size:clamp(14px,1.8vw,18px);line-height:1.9;font-style:italic;color:rgba(232,232,228,.8);margin-bottom:28px}
.testi-author{font-size:11px;letter-spacing:.1em;color:var(--dim)}
.testi-author strong{color:var(--fg);display:block;font-size:12px;margin-bottom:3px}
.testi-nav{display:flex;gap:12px;margin-top:32px;align-items:center}
.testi-btn{width:28px;height:28px;border:1px solid var(--border);background:none;cursor:none;font-family:var(--font);color:var(--dim);display:flex;align-items:center;justify-content:center;transition:border-color .3s,color .3s;font-size:14px}
.testi-btn:hover{border-color:var(--fg);color:var(--fg)}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--border);transition:background .3s,transform .3s}
.tdot.on{background:var(--fg);transform:scale(1.5)}
.tdots{display:flex;gap:8px;margin-left:auto}

/* FAQ */
.flist{list-style:none}
.fi{border-top:1px solid var(--border)}
.fi:last-child{border-bottom:1px solid var(--border)}
.fq{display:flex;justify-content:space-between;align-items:center;padding:24px 0;cursor:none;font-size:13px;font-weight:700;letter-spacing:.02em;transition:color .3s;user-select:none}
.fq:hover{color:#fff}
.ftog{font-size:20px;color:var(--dim);line-height:1;transition:transform .45s var(--back),color .3s}
.fi.open .ftog{transform:rotate(45deg);color:var(--fg)}
.fans{font-size:12px;line-height:2.1;color:rgba(232,232,228,.55);max-height:0;overflow:hidden;transition:max-height .6s var(--ease),padding .4s}
.fi.open .fans{max-height:400px;padding-bottom:28px}

/* CONTACT */
.soc{display:flex;gap:32px;flex-wrap:wrap;align-items:center}
.slink{text-decoration:none;color:var(--dim);font-size:11px;letter-spacing:.1em;position:relative;transition:color .3s;padding-bottom:3px;cursor:none}
.slink::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--fg);transition:width .45s var(--ease)}
.slink:hover{color:var(--fg)}
.slink:hover::after{width:100%}
.copy-btn{background:none;border:1px solid var(--border);color:var(--dim);font-family:var(--font);font-size:10px;letter-spacing:.1em;padding:8px 16px;cursor:none;transition:border-color .3s,color .3s,background .3s;display:flex;align-items:center;gap:8px}
.copy-btn:hover{border-color:var(--fg);color:var(--fg)}
.copy-btn.copied{border-color:#3ddc84;color:#3ddc84}

footer{padding:48px 80px 48px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim);letter-spacing:.1em}

/* REVEAL */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal.vis{opacity:1;transform:translateY(0)}

/* CURSOR TEXT */
.cur-text{position:fixed;font-size:9px;letter-spacing:.12em;color:var(--bg);pointer-events:none;z-index:7001;opacity:0;transition:opacity .2s;white-space:nowrap;transform:translate(12px,-50%)}
.cur-text.show{opacity:1}

@keyframes su{from{opacity:0;transform:translateY(108%)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes la{0%,100%{width:36px;opacity:.5}50%{width:72px;opacity:1}}

@media(max-width:900px){
  nav.side{display:none}
  .hbg{display:flex}
  main{padding:0}
  section{padding:100px 24px 80px}
  .skills-grid{grid-template-columns:1fr;gap:0}
  .about-grid{grid-template-columns:1fr;gap:40px}
  footer{padding:32px 24px;flex-direction:column;gap:16px}
  header{padding:20px 24px}
  .stats{gap:32px}
  #btt{right:20px;bottom:20px}
}
</style>
</head>
<body>
<div id="prog"></div>
<div id="tflash"></div>
<div id="wipe"></div>
<canvas id="fog"></canvas>
<div class="proj-preview" id="prev-card">
  <img id="prev-img" src="" alt=""/>
  <div class="prev-label" id="prev-label"></div>
</div>
<button id="btt" aria-label="Back to top">↑</button>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── DATA ──────────────────────────────────────────────────────────
const PROJECTS = [
  { name:"Devkit - CSS Companion Website", url:"https://devkit-pi.vercel.app/", date:"2024", role:"Full Stack Dev", tag:"Next.js · MongoDB", thumb:"assets/devkit.png" },
  { name:"CodeSnap - Formatter",             url:"https://codesnap-one.vercel.app/", date:"2024", role:"Frontend Dev",   tag:"React · GPT-4",   thumb:"assets/codesnap.png" },
  { name:"TypeScale - Calculator",           url:"https://typescale-six.vercel.app/", date:"2024", role:"Full Stack Dev", tag:"MERN · OpenAI",   thumb:"assets/typescale.png" },
  { name:"Flexlab - CSS Playground",            url:"https://flexlab-nine.vercel.app/", date:"2023", role:"Full Stack Dev", tag:"Next.js · Stripe", thumb:"assets/flexlab.png" },
  { name:"UnitShift - Converter",                     url:"https://unitshift.vercel.app/", date:"2023", role:"Frontend Dev",   tag:"React · Rapid API",thumb:"assets/unitshift.png" },
  { name:"CharCheck - Character Analyzer",       url:"https://charcheck.vercel.app/", date:"2023", role:"Full Stack Dev", tag:"MERN · Refine",    thumb:"assets/charcheck.png" },
  { name:"StudyOS - IT Student Hub",       url:"https://charcheck.vercel.app/", date:"2023", role:"Full Stack Dev", tag:"MERN · Refine",    thumb:"assets/studyos.png" },
  { name:"AlgoLens - Visualizer",       url:"https://charcheck.vercel.app/", date:"2023", role:"Full Stack Dev", tag:"MERN · Refine",    thumb:"assets/algolens.png" },
  { name:"ProdOS - IT Productivity Suite",       url:"https://prodos-nine.vercel.app/", date:"2023", role:"Full Stack Dev", tag:"MERN · Refine",    thumb:"assets/prodos.png" },


];

const SKILLS = [
  {name:"React / Next.js",pct:92},{name:"TypeScript",pct:85},
  {name:"Tailwind CSS",pct:90},   {name:"Node.js",pct:78},
  {name:"Figma / UI",pct:88},     {name:"GSAP / Motion",pct:80},
  {name:"REST / OpenAI APIs",pct:84},{name:"MongoDB / SQL",pct:73},
];

const TIMELINE = [
  {date:"2024 — Present",role:"Frontend Developer",company:"Freelance / Remote",desc:"Building bespoke web experiences for clients across PH and internationally. Specializing in React, Next.js, animations, and design systems."},
  {date:"2023 — 2024",role:"Full Stack Developer",company:"Personal Projects",desc:"Built AI-powered apps, e-commerce platforms, and data analytics tools using the MERN stack, Next.js 13, OpenAI APIs, and Stripe."},
  {date:"2022 — 2023",role:"Web Developer",company:"Learning & Freelance, PH",desc:"Developed interactive frontends and RESTful backends. Focused on responsive design, performance optimization, and clean UI/UX."},
];

const TESTIMONIALS = [
  {quote:"Francis delivered beyond our expectations. The animations and attention to detail set our site apart from every competitor.",author:"Maria Santos",role:"Founder, TechCo PH"},
  {quote:"Working with Francis was seamless. He understood the brief immediately and produced something truly stunning.",author:"James Reyes",role:"Creative Director"},
  {quote:"The best frontend developer I've worked with. Fast, precise, and genuinely passionate about the craft.",author:"Anna Cruz",role:"Product Manager"},
];

const FAQS = [
  {q:"What stack do you specialize in?",a:"I specialize in the MERN stack (MongoDB, Express, React, Node.js) and Next.js for full-stack apps. For UI I use Tailwind CSS and GSAP/Framer Motion for animations."},
  {q:"Have you worked with AI APIs?",a:"Yes — I've built projects using OpenAI's GPT-4 and DALL-E APIs, including an AI Article Summarizer and a MERN AI Image Generator app."},
  {q:"Available for freelance work?",a:"Yes! I'm open to interesting projects. Feel free to reach out via email or any of my socials below."},
  {q:"What's your design philosophy?",a:"Great design is invisible. Every interaction should feel natural and intentional — never forced. I aim for experiences that feel effortless."},
];

const THEMES={dark:{"--bg":"#080808","--fg":"#e8e8e4","--dim":"#4a4a4a","--border":"#1e1e1e"},light:{"--bg":"#f0f0ec","--fg":"#080808","--dim":"#aaaaaa","--border":"#dddddd"},mono:{"--bg":"#0c0c0c","--fg":"#39ff9a","--dim":"#1a5c40","--border":"#0f2d20"}};
const NAV_LINKS=["home","about","projects","skills","timeline","testimonials","contact","faq"];

// ── FOG + PARTICLES ───────────────────────────────────────────────
function useFog() {
  useEffect(()=>{
    const C=document.getElementById("fog"),ctx=C.getContext("2d");
    let W,H,raf,frame=0,t=0,mx=.5,my=.5,tmx=.5,tmy=.5,sy=0,syt=0;
    const resize=()=>{W=C.width=window.innerWidth;H=C.height=window.innerHeight;};
    resize(); window.addEventListener("resize",resize);
    window.addEventListener("mousemove",e=>{tmx=e.clientX/W;tmy=e.clientY/H;});
    window.addEventListener("scroll",()=>{sy=window.scrollY;});

    // Fog blobs
    const B=Array.from({length:6},(_,i)=>({phase:(i/6)*Math.PI*2,spd:.055+i*.007,cx:.15+(i/5)*.7,cy:.1+(i/5)*.8,orx:.22+(i%3)*.06,ory:.18+(i%2)*.1,size:.30+(i%3)*.09,alpha:.048+(i%3)*.011}));

    // Particles
    const P=Array.from({length:55},(_,i)=>({
      x:Math.random()*1920, y:Math.random()*1080,
      vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.14,
      r:Math.random()*1.4+.3, a:Math.random()*.18+.04,
    }));

    const draw=()=>{
      raf=requestAnimationFrame(draw); if(++frame%2!==0)return;
      mx+=(tmx-mx)*.035; my+=(tmy-my)*.035; syt+=(sy-syt)*.06;
      ctx.clearRect(0,0,W,H);

      // Fog
      for(const b of B){
        const bx=(b.cx+Math.sin(t*b.spd+b.phase)*b.orx)*W;
        const by=(b.cy+Math.cos(t*b.spd*.8+b.phase)*b.ory)*H-syt*.05;
        const br=W*b.size*(1+.06*Math.sin(t*.25+b.phase));
        const g=ctx.createRadialGradient(bx,by,0,bx,by,br);
        g.addColorStop(0,`rgba(210,210,200,${b.alpha})`);
        g.addColorStop(.5,`rgba(200,200,190,${b.alpha*.3})`);
        g.addColorStop(1,"rgba(0,0,0,0)");
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      }

      // Particles
      for(const p of P){
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        // mouse attract
        const dx=mx*W-p.x,dy=my*H-p.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<180){p.vx+=dx/d*.008;p.vy+=dy/d*.008;}
        p.vx*=.99;p.vy*=.99;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(220,220,210,${p.a})`;
        ctx.fill();
      }

      // Mouse glow
      const gx=mx*W,gy=my*H;
      const g1=ctx.createRadialGradient(gx,gy,0,gx,gy,W*.26);
      g1.addColorStop(0,"rgba(230,230,220,0.09)");g1.addColorStop(.5,"rgba(210,210,200,0.03)");g1.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);
      const g2=ctx.createRadialGradient(gx,gy,0,gx,gy,W*.06);
      g2.addColorStop(0,"rgba(240,240,230,0.11)");g2.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);

      // Vignette
      const v=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.85);
      v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,0.72)");
      ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
      t+=.014;
    };
    draw();
    return()=>{cancelAnimationFrame(raf);};
  },[]);
}

// ── SCROLL PROGRESS ───────────────────────────────────────────────
function useScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById("prog");
    const fn=()=>{const h=document.documentElement.scrollHeight-window.innerHeight;bar.style.width=(h>0?(window.scrollY/h)*100:0)+"%";};
    window.addEventListener("scroll",fn); return()=>window.removeEventListener("scroll",fn);
  },[]);
}

// ── BACK TO TOP ───────────────────────────────────────────────────
function useBackToTop(){
  useEffect(()=>{
    const btn=document.getElementById("btt");
    const fn=()=>btn.classList.toggle("show",window.scrollY>400);
    window.addEventListener("scroll",fn);
    btn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
    return()=>window.removeEventListener("scroll",fn);
  },[]);
}

// ── REVEAL ────────────────────────────────────────────────────────
function useReveal(ref,delay=0){
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.style.transitionDelay=delay+"s";
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){ref.current.classList.add("vis");obs.disconnect();}},{threshold:.08});
    obs.observe(ref.current); return()=>obs.disconnect();
  },[]);
}
function Rev({tag:Tag="div",className="",delay=0,children,...p}){
  const r=useRef(null);useReveal(r,delay);
  return <Tag ref={r} className={`reveal ${className}`} {...p}>{children}</Tag>;
}

// ── TYPEWRITER ────────────────────────────────────────────────────
function Typewriter({texts,delay=2100}){
  const [display,setDisplay]=useState("");
  const [ti,setTi]=useState(0);
  const [ci,setCi]=useState(0);
  const [deleting,setDeleting]=useState(false);
  useEffect(()=>{
    const t=setTimeout(()=>{
      const cur=texts[ti];
      if(!deleting){
        setDisplay(cur.slice(0,ci+1));
        if(ci+1===cur.length){setTimeout(()=>setDeleting(true),1800);}
        else setCi(c=>c+1);
      } else {
        setDisplay(cur.slice(0,ci-1));
        if(ci-1===0){setDeleting(false);setTi(t=>(t+1)%texts.length);}
        else setCi(c=>c-1);
      }
    },deleting?45:75);
    return()=>clearTimeout(t);
  },[display,deleting,ti,ci]);
  // Wait for splash
  const [started,setStarted]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setStarted(true),delay);return()=>clearTimeout(t);},[]);
  if(!started)return <span>Designer &amp; Developer</span>;
  return <span>{display}<span style={{borderRight:"1px solid var(--dim)",marginLeft:"1px",animation:"blink 1s step-end infinite"}}></span></span>;
}

// ── CURSOR ────────────────────────────────────────────────────────
function Cursor(){
  const cr=useRef(null),rr=useRef(null);
  useEffect(()=>{
    let cx=0,cy=0,rx=0,ry=0,raf;
    const onM=e=>{cx=e.clientX;cy=e.clientY;cr.current.style.left=cx+"px";cr.current.style.top=cy+"px";};
    window.addEventListener("mousemove",onM);
    const loop=()=>{raf=requestAnimationFrame(loop);rx+=(cx-rx)*.11;ry+=(cy-ry)*.11;rr.current.style.left=rx+"px";rr.current.style.top=ry+"px";};
    loop();
    const ov=()=>{cr.current.classList.add("h");rr.current.classList.add("h");};
    const ou=()=>{cr.current.classList.remove("h");rr.current.classList.remove("h");};
    const ref=()=>document.querySelectorAll("a,button,.fq,.testi-btn,.copy-btn").forEach(el=>{el.addEventListener("mouseenter",ov);el.addEventListener("mouseleave",ou);});
    ref();
    const mo=new MutationObserver(ref);mo.observe(document.body,{childList:true,subtree:true});
    const oc=e=>{
      cr.current.classList.add("ck");setTimeout(()=>cr.current.classList.remove("ck"),200);
      const d=document.createElement("div");d.className="rip";
      d.style.cssText=`width:80px;height:80px;left:${e.clientX}px;top:${e.clientY}px`;
      document.body.appendChild(d);setTimeout(()=>d.remove(),650);
    };
    window.addEventListener("click",oc);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener("mousemove",onM);window.removeEventListener("click",oc);mo.disconnect();};
  },[]);
  return <><div ref={cr} className="cur"/><div ref={rr} className="cur-ring"/></>;
}

// ── SPLASH ────────────────────────────────────────────────────────
function Splash({onDone}){
  const [hide,setHide]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>{setHide(true);setTimeout(onDone,900);},2100);return()=>clearTimeout(t);},[]);
  return(
    <div id="splash" className={hide?"hide":""}>
      <div style={{textAlign:"center"}}>
        <div className="sp-name"><span>Francis Niel Tamayo</span></div>
        <div className="sp-bar"/>
        <div className="sp-sub">DESIGNER &amp; DEVELOPER</div>
      </div>
    </div>
  );
}

// ── COUNTER ───────────────────────────────────────────────────────
function Counter({target}){
  const [v,setV]=useState(0);const r=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting)return;obs.disconnect();
      let s=0;const step=()=>{s+=Math.ceil((target-s)/8);setV(s>=target?target:s);if(s<target)requestAnimationFrame(step);};
      requestAnimationFrame(step);
    },{threshold:.5});
    obs.observe(r.current);return()=>obs.disconnect();
  },[target]);
  return <span ref={r}>{v}</span>;
}

// ── MAGNETIC PROJECT ITEM ─────────────────────────────────────────
function MagItem({p,delay}){
  const ref=useRef(null),lref=useRef(null),rref=useRef(null);
  useReveal(rref,delay);
  useEffect(()=>{
    const el=ref.current,link=lref.current;if(!el||!link)return;
    const card=document.getElementById("prev-card");
    const img=document.getElementById("prev-img");
    const lbl=document.getElementById("prev-label");
    const onM=e=>{
      const r=el.getBoundingClientRect();
      link.style.transform=`translate(${(e.clientX-(r.left+r.width/2))*.09}px,${(e.clientY-(r.top+r.height/2))*.13}px)`;
      // position preview card
      let px=e.clientX+28,py=e.clientY-70;
      if(px+240>window.innerWidth)px=e.clientX-260;
      card.style.left=px+"px";card.style.top=py+"px";
    };
    const onE=()=>{
      img.src=p.thumb;lbl.textContent=p.name;
      card.classList.add("show");
    };
    const onL=()=>{link.style.transform="";card.classList.remove("show");};
    el.addEventListener("mousemove",onM);el.addEventListener("mouseenter",onE);el.addEventListener("mouseleave",onL);
    return()=>{el.removeEventListener("mousemove",onM);el.removeEventListener("mouseenter",onE);el.removeEventListener("mouseleave",onL);};
  },[]);
  return(
    <div ref={rref} className="reveal">
      <li ref={ref} className="pi">
        <a ref={lref} href={p.url} target="_blank" rel="noreferrer" className="plink" style={{transition:"transform .35s cubic-bezier(.34,1.56,.64,1)"}}>
          <span className="pname">{p.name}</span>
          <span className="ptag">{p.tag}</span>
          <span className="pmeta">{p.date}</span>
          <span className="parr">↗</span>
        </a>
      </li>
    </div>
  );
}

// ── SKILL BAR ─────────────────────────────────────────────────────
function SkillBar({name,pct,delay}){
  const fr=useRef(null);
  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{
      if(!e.isIntersecting)return;obs.disconnect();
      if(fr.current){fr.current.style.transitionDelay=delay+"s";fr.current.classList.add("go");}
    },{threshold:.3});
    if(fr.current)obs.observe(fr.current);return()=>obs.disconnect();
  },[]);
  return(
    <div className="skill-row">
      <div className="skill-top"><span>{name}</span><span className="skill-pct">{pct}%</span></div>
      <div className="skill-track"><div ref={fr} className="skill-fill" style={{"--w":pct+"%"}}/></div>
    </div>
  );
}

// ── PAGE WIPE ─────────────────────────────────────────────────────
const goTo=(id,e)=>{
  e&&e.preventDefault();
  const wipe=document.getElementById("wipe");
  wipe.className="in";
  setTimeout(()=>{
    document.getElementById(id)?.scrollIntoView({behavior:"instant"});
    wipe.className="out";
    setTimeout(()=>{wipe.className="";},450);
  },450);
};

// ── COPY EMAIL ────────────────────────────────────────────────────
function CopyEmail(){
  const [copied,setCopied]=useState(false);
  const copy=()=>{
    navigator.clipboard.writeText("hello@francisnieltamayo.com").then(()=>{
      setCopied(true);setTimeout(()=>setCopied(false),2000);
    });
  };
  return(
    <button className={`copy-btn${copied?" copied":""}`} onClick={copy}>
      {copied?"✓ Copied!":"Copy Email"}
    </button>
  );
}
